{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h1>Login</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
</div>
<p>Don't have an account? <a href="{% url 'tasks:register' %}">Sign up here</a></p>
{%endblock%}
