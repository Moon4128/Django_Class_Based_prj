{% extends 'base.html' %}

{% block content %}
<div class="container mt-3">
    <h1>Delete Task</h1>
    <p>Are you sure you want to delete {{ object.title }}?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class = "btn btn-danger">Yes</button>
        <a href="{% url 'tasks:task-list' %}" class="btn btn-secondary">No</a>
    </form>
</div>
{%endblock%}
