{% extends 'base.html' %}

{% block content %}
<h1>Task List</h1>
<a href="#">Create new task</a>

<ul>
    {% for task in tasks %}
        <li>
            <a href="{% url 'tasks:task-detail' pk=task.pk %}">{{ task.title }}</a>
            {{task.status}} {{task.priority}}
        </li>
    {% empty %}
    <li>You have no tasks</li>
    {% endfor %}
</ul>
{%endblock%}
