{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Task List</h1>
        <a href="{% url 'tasks:task-create' %}" class="btn btn-primary">Create new task</a>
    </div>

    <form method="get" class="mb-3">
        {{ form.as_p }}
        <button type="submit" class="btn btn-outline-primary">Filter</button>
    </form>

    <ul class="list-group">
        {% for task in tasks %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <a href="{% url 'tasks:task-detail' pk=task.pk %}" class="text-decoration-none fw-semibold">{{ task.title }}</a>
                </div>
                <div class="text-end small text-muted">
                    {{ task.status }} · {{ task.priority }}
                </div>
            </li>
        {% empty %}
            <li class="list-group-item text-muted">You have no tasks</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
