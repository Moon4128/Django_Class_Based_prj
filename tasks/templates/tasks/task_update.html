{% extends 'base.html' %}

{% block content %}
<h2>Editing Task</h2>
<form method="post" class="mt-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save</button>
</form>

<a href="{% url 'tasks:task-list' %}" class="btn btn-secondary mt-3">Go back</a>
{%endblock%}
