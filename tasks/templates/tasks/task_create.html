{% extends 'base.html' %}

{% block content %}
<div class="container mt-3">
    <h2>Create Task</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Create</button>
    </form>
</div>

<a href="{% url 'tasks:task-list' %}" class="btn btn-secondary mt-3">Go back</a>
{%endblock%}
